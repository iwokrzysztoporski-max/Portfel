<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Portfel</title>
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="icon" href="/icon-192.png" />
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Portfel" />
<meta name="theme-color" content="#0F1B2D" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="/config.js"></script>
<style>
  :root{ --ink:#0F1B2D; --bg:#F5F6F8; --surface:#FFFFFF; --muted:#64748B;
    --line:#E6E9EF; --accent:#2563EB; --gain:#16A34A; --loss:#DC2626; --bench:#F59E0B; }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);
    padding:max(16px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .brand img{width:32px;height:32px;border-radius:9px;}
  h1{font-size:18px;font-weight:800;margin:0;}
  .sub{color:var(--muted);font-size:13px;margin:4px 0 16px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;
    box-shadow:0 1px 2px rgba(15,27,45,.04),0 8px 24px rgba(15,27,45,.04);}
  label.f{font-size:12px;color:var(--muted);display:block;margin:0 0 5px 2px;font-weight:600;}
  input,select{width:100%;padding:11px 12px;font-size:15px;border:1px solid #CBD5E1;border-radius:10px;
    background:#fff;outline:none;color:var(--ink);-webkit-appearance:none;appearance:none;}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  button.primary{width:100%;padding:13px 20px;background:var(--accent);color:#fff;border:0;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;}
  button.primary:disabled{opacity:.6;cursor:default;}
  button.secondary{width:100%;padding:12px 20px;background:#fff;color:var(--accent);border:1px solid #BFD3F5;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
  .grid{display:grid;grid-template-columns:1fr 80px 90px;gap:8px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}.grid2{grid-template-columns:1fr;}}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:0;}
  .tk{font-size:15px;font-weight:700;}
  .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .x{color:var(--muted);cursor:pointer;font-size:14px;padding:4px 8px;}
  .x:hover{color:var(--loss);}
  .msg{font-size:13px;margin-top:10px;padding:10px 12px;border-radius:10px;}
  .msg.ok{color:var(--gain);background:#F0FDF4;border:1px solid #BBF7D0;}
  .msg.err{color:var(--loss);background:#FEF2F2;border:1px solid #FECACA;}
  .msg.warn{color:#92400E;background:#FFFBEB;border:1px solid #FDE68A;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .who{font-size:12px;color:var(--muted);}
  .logout{font-size:12px;color:var(--accent);background:none;border:0;cursor:pointer;font-weight:600;}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;display:inline-block;margin-right:6px;}
  .empty{text-align:center;color:#94A3B8;font-size:14px;padding:30px 10px;}
  .center{min-height:70vh;display:flex;flex-direction:column;justify-content:center;}
  .pill{display:inline-block;background:#EFF6FF;color:var(--accent);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:12px;}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;}
  .tabs{display:flex;gap:4px;background:#EEF1F5;border-radius:12px;padding:4px;margin-bottom:16px;}
  .tabs button{flex:1;border:0;border-radius:9px;padding:9px 0;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);}
  .tabs button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(15,27,45,.08);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .chip{padding:7px 12px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .rpct{font-size:28px;font-weight:800;letter-spacing:-.02em;}
  .gain{color:var(--gain);} .loss{color:var(--loss);}
  .rfoot{font-size:12px;color:var(--muted);text-align:right;margin-top:6px;}
  .statline{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line);}
  .statline:last-child{border-bottom:0;}
  .stk{font-size:13px;color:var(--muted);} .sv{font-size:16px;font-weight:800;}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px;vertical-align:middle;}
  .legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:12px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="empty">Ładowanie…</div></div>
<script>
const $ = (id) => document.getElementById(id);
let sb=null, session=null, allTx=[], activeTab="pf", chart=null, selectedTicker=null;
const priceCache={}, fxCache={};

function configOk(){ return window.SUPABASE_URL && window.SUPABASE_ANON_KEY
  && window.SUPABASE_URL.indexOf("WKLEJ")<0 && window.SUPABASE_ANON_KEY.indexOf("WKLEJ")<0; }

function init(){
  if(!configOk()){
    $("root").innerHTML='<div class="brand"><img src="/icon-192.png" alt=""/><h1>Portfel</h1></div>'+
      '<div class="card" style="margin-top:14px"><div class="msg err">Brak konfiguracji Supabase. Uzupełnij plik <strong>config.js</strong>.</div></div>';
    return;
  }
  sb=window.supabase.createClient(window.SUPABASE_URL,window.SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{ session=data.session;
    sb.auth.onAuthStateChange((_e,s)=>{ session=s; route(); }); route(); });
}
function route(){ if(session&&session.user) renderApp(); else renderLogin(); }

/* ---------- LOGOWANIE ---------- */
function renderLogin(){
  $("root").innerHTML='<div class="center"><div class="brand"><img src="/icon-192.png" alt=""/><h1>Portfel</h1></div>'+
    '<p class="sub">Zaloguj się hasłem — te same dane na telefonie i komputerze.</p>'+
    '<div class="card"><span class="pill">Logowanie e-mail + hasło</span>'+
    '<label class="f">E-mail</label><input id="email" type="email" inputmode="email" autocomplete="email" placeholder="ty@example.com"/>'+
    '<label class="f" style="margin-top:10px">Hasło</label><input id="password" type="password" autocomplete="current-password" placeholder="min. 6 znaków"/>'+
    '<button class="primary" id="loginBtn" style="margin-top:14px">Zaloguj</button>'+
    '<button class="secondary" id="signupBtn">Utwórz konto (pierwszy raz)</button>'+
    '<div id="loginMsg"></div><div class="hint">Zapisz hasło w menedżerze haseł — nie wysyłamy żadnych e-maili.</div></div></div>';
  $("loginBtn").onclick=doLogin; $("signupBtn").onclick=doSignup;
  $("password").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
}
function creds(){ return { email:$("email").value.trim(), password:$("password").value }; }
async function doLogin(){
  const {email,password}=creds(); const msg=$("loginMsg");
  if(!email||!password){ msg.innerHTML='<div class="msg err">Podaj e-mail i hasło.</div>'; return; }
  const btn=$("loginBtn"); btn.disabled=true; btn.textContent="Loguję…";
  const {error}=await sb.auth.signInWithPassword({email,password});
  btn.disabled=false; btn.textContent="Zaloguj";
  if(error) msg.innerHTML='<div class="msg err">Niepoprawny e-mail lub hasło. Pierwszy raz? Kliknij „Utwórz konto”.</div>';
}
async function doSignup(){
  const {email,password}=creds(); const msg=$("loginMsg");
  if(!email||!password){ msg.innerHTML='<div class="msg err">Podaj e-mail i hasło.</div>'; return; }
  if(password.length<6){ msg.innerHTML='<div class="msg err">Hasło min. 6 znaków.</div>'; return; }
  const btn=$("signupBtn"); btn.disabled=true; btn.textContent="Tworzę…";
  const {data,error}=await sb.auth.signUp({email,password});
  btn.disabled=false; btn.textContent="Utwórz konto (pierwszy raz)";
  if(error){ let m=error.message; if(/already/i.test(m)) m="Konto już istnieje — kliknij „Zaloguj”."; msg.innerHTML='<div class="msg err">'+m+'</div>'; return; }
  if(!data.session) msg.innerHTML='<div class="msg err">Wyłącz „Confirm email” w Supabase, potem zaloguj się.</div>';
}

/* ---------- SHELL ---------- */
function renderApp(){
  $("root").innerHTML='<div class="topbar"><div class="brand"><img src="/icon-192.png" alt=""/><h1>Portfel</h1></div>'+
    '<div style="text-align:right"><div class="who">'+session.user.email+'</div><button class="logout" id="logoutBtn">Wyloguj</button></div></div>'+
    '<div class="tabs"><button id="tab_pf">Portfel</button><button id="tab_ch">Zwroty</button><button id="tab_tx">Transakcje</button></div>'+
    '<div id="content"></div>';
  $("logoutBtn").onclick=()=>sb.auth.signOut();
  $("tab_pf").onclick=()=>{ activeTab="pf"; renderTab(); };
  $("tab_ch").onclick=()=>{ activeTab="ch"; renderTab(); };
  $("tab_tx").onclick=()=>{ activeTab="tx"; renderTab(); };
  fetchTx().then(renderTab);
}
function renderTab(){
  $("tab_pf").className=activeTab==="pf"?"active":"";
  $("tab_ch").className=activeTab==="ch"?"active":"";
  $("tab_tx").className=activeTab==="tx"?"active":"";
  if(chart){ chart.destroy(); chart=null; }
  if(activeTab==="pf") renderPortfolioView();
  else if(activeTab==="ch") renderChartView();
  else renderTxView();
}
async function fetchTx(){
  const {data,error}=await sb.from("transactions").select("*").order("date",{ascending:false}).order("created_at",{ascending:false});
  allTx=(!error&&data)?data:[]; return allTx;
}

/* ---------- helpers ---------- */
function lastBusinessDay(){ const d=new Date(); d.setDate(d.getDate()-1);
  while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function dmap(series){ const m={}; series.forEach(p=> m[p.date]=p.close); return m; }
function onOrBefore(map,date){ if(map[date]!=null) return map[date];
  let d=new Date(date+"T12:00:00Z"); for(let i=0;i<10;i++){ d.setDate(d.getDate()-1);
    const k=d.toISOString().slice(0,10); if(map[k]!=null) return map[k]; } return null; }
function fmtPLN(v){ return Math.round(v).toLocaleString("pl-PL")+" zł"; }
function fmtPct(v){ return (v>=0?"+":"")+v.toFixed(2)+"%"; }
function xirr(flows){
  if(!flows || flows.length<2) return null;
  const f=flows.slice().sort((a,b)=> a.date<b.date?-1:1);
  const t0=new Date(f[0].date+"T12:00:00Z").getTime();
  const yrs=x=> (new Date(x.date+"T12:00:00Z").getTime()-t0)/(365*864e5);
  const npv=r=> f.reduce((s,x)=> s + x.amt/Math.pow(1+r, yrs(x)), 0);
  let lo=-0.9999, hi=10, flo=npv(lo), fhi=npv(hi);
  if(!isFinite(flo)||!isFinite(fhi)||flo*fhi>0) return null;
  for(let i=0;i<200;i++){ const mid=(lo+hi)/2, fm=npv(mid);
    if(Math.abs(fm)<1e-6) return mid;
    if(flo*fm<0){ hi=mid; } else { lo=mid; flo=fm; } }
  return (lo+hi)/2;
}
async function fetchSeries(ticker,country){
  const key=ticker+"|"+country; if(priceCache[key]) return priceCache[key];
  const r=await fetch("/api/prices?symbol="+encodeURIComponent(ticker)+"&country="+encodeURIComponent(country));
  const data=await r.json(); if(!r.ok||data.error) throw new Error(data.error||("HTTP "+r.status));
  priceCache[key]=data.prices; return data.prices;
}
async function fetchFx(start,end){
  const key=start+"|"+end; if(fxCache[key]) return fxCache[key];
  const r=await fetch("/api/fx?start="+start+"&end="+end);
  const data=await r.json(); if(!r.ok||data.error) throw new Error(data.error||("HTTP "+r.status));
  fxCache[key]=data.rates; return data.rates;
}
function uniqueTickers(){
  const m={}; allTx.forEach(tx=>{ if(!tx.ticker) return;
    const key=tx.ticker+"|"+(tx.country||"US"); const price=(tx.price!=null)?tx.price:null;
    if(!m[key]) m[key]={ ticker:tx.ticker, country:tx.country||"US", firstDate:tx.date, buyPrice:price };
    else if(tx.date<m[key].firstDate){ m[key].firstDate=tx.date; m[key].buyPrice=price; }
  });
  return Object.values(m).sort((a,b)=> a.ticker.localeCompare(b.ticker));
}

/* ---------- PORTFEL vs NASDAQ ---------- */
function computePF(txs, series, qqq, fx, axis){
  const hasDep = txs.some(t=> t.type==="deposit" || t.type==="withdraw");
  const pos={}; let cashPLN=0, qqqShares=0, netDep=0; const out=[]; const flows=[];
  const sorted=txs.slice().sort((a,b)=> a.date<b.date?-1:1); let bi=0;
  for(const date of axis){ let cfStep=0;
    while(bi<sorted.length && sorted[bi].date<=date){ const tx=sorted[bi]; bi++;
      const fxD=onOrBefore(fx,tx.date)||4.0; const qpx=onOrBefore(qqq,tx.date);
      if(tx.type==="deposit"){
        const dPLN=(tx.amount_pln!=null)?tx.amount_pln:(tx.amount_usd!=null?tx.amount_usd*fxD:0);
        const dUSD=(tx.amount_usd!=null)?tx.amount_usd:(tx.amount_pln!=null?tx.amount_pln/fxD:0);
        cashPLN+=dPLN; netDep+=dPLN; cfStep+=dPLN; flows.push({date:tx.date,amt:-dPLN});
        if(qpx) qqqShares+=dUSD/qpx;
      } else if(tx.type==="withdraw"){
        const wPLN=(tx.amount_pln!=null)?tx.amount_pln:(tx.amount_usd!=null?tx.amount_usd*fxD:0);
        cashPLN-=wPLN; netDep-=wPLN; cfStep-=wPLN; flows.push({date:tx.date,amt:+wPLN});
        const benchNow=qpx?qqqShares*qpx*fxD:0; if(benchNow>0){ const frac=Math.min(1,wPLN/benchNow); qqqShares*=(1-frac); }
      } else if(tx.type==="dividend"||tx.type==="interest"||tx.type==="tax"){
        const a=(tx.amount_pln!=null)?tx.amount_pln:(tx.amount_usd!=null?tx.amount_usd*fxD:0);
        cashPLN+=a; // podatek ma kwotę ujemną
      } else if(tx.ticker){
        const key=tx.ticker+"|"+(tx.country||"US"); if(!pos[key]) pos[key]={qty:0,country:tx.country||"US",costPLN:0,qqqShares:0}; const p=pos[key];
        const px=(tx.price!=null)?tx.price:onOrBefore(series[key],tx.date); const cls0=onOrBefore(series[key],tx.date); const mv=(cls0!=null)?cls0:(px||0);
        if(tx.type==="sell"){
          const procPLN=(tx.amount_pln!=null)?Math.abs(tx.amount_pln):((tx.country==="PL")?tx.qty*(px||0):tx.qty*(px||0)*fxD);
          const smvPLN=(tx.country==="PL")?tx.qty*mv:tx.qty*mv*fxD;
          if(p.qty>0){ const frac=Math.min(1,(tx.qty||0)/p.qty); p.costPLN*=(1-frac); p.qqqShares*=(1-frac); p.qty-=(tx.qty||0); if(p.qty<0)p.qty=0; }
          if(hasDep) cashPLN+=procPLN; else { cfStep-=smvPLN; flows.push({date:tx.date,amt:+procPLN}); }
        } else {
          const costPLN=(tx.amount_pln!=null)?Math.abs(tx.amount_pln):((tx.country==="PL")?tx.qty*(px||0):tx.qty*(px||0)*fxD);
          const costUSD=(tx.country==="PL")?(px?tx.qty*px/fxD:0):tx.qty*(px||0);
          p.qty+=tx.qty||0; p.costPLN+=costPLN;
          if(hasDep) cashPLN-=costPLN; else { cfStep+=(tx.country==="PL")?tx.qty*mv:tx.qty*mv*fxD; flows.push({date:tx.date,amt:-costPLN}); if(qpx) p.qqqShares+=costUSD/qpx; }
        }
      }
    }
    const fxN=onOrBefore(fx,date)||4.0; let stockVal=0, investedBuys=0, qqqSharesBuy=0;
    for(const k in pos){ const p=pos[k]; investedBuys+=p.costPLN; qqqSharesBuy+=p.qqqShares;
      if(p.qty>1e-9){ const cls=onOrBefore(series[k],date); if(cls!=null) stockVal+=(p.country==="PL")?p.qty*cls:p.qty*cls*fxN; } }
    const qN=onOrBefore(qqq,date); let invested,port,bench,cash;
    if(hasDep){ invested=netDep; cash=cashPLN; port=stockVal+cashPLN; bench=qN?qqqShares*qN*fxN:0; }
    else { invested=investedBuys; cash=0; port=stockVal; bench=qN?qqqSharesBuy*qN*fxN:0; }
    if(invested<=0 && port<=0) continue;
    out.push({ date, invested, port, bench, cf:cfStep, cash, stock:stockVal });
  }
  return { pts:out, flows, mode:hasDep };
}
async function buildPortfolio(){
  const tickers=uniqueTickers(); if(!tickers.length) return null;
  const sorted=allTx.slice().sort((a,b)=> a.date<b.date?-1:1);
  const firstDate=sorted[0].date; const end=lastBusinessDay();
  const series={}; const failed=[];
  for(const t of tickers){ try{ series[t.ticker+"|"+t.country]=dmap(await fetchSeries(t.ticker,t.country)); }catch(e){ failed.push(t.ticker); } }
  let qqq; try{ qqq=dmap(await fetchSeries("QQQ","US")); }catch(e){ throw new Error("Nie udało się pobrać danych Nasdaq (QQQ)."); }
  let fx; try{ fx=await fetchFx(firstDate,end); }catch(e){ throw new Error("Nie udało się pobrać kursu USD/PLN (NBP)."); }
  const axis=Object.keys(qqq).filter(d=> d>=firstDate && d<=end).sort();
  if(axis.length<3) throw new Error("Za mało danych do wykresu.");
  const { pts, flows, mode }=computePF(allTx, series, qqq, fx, axis);
  if(!pts.length) throw new Error("Brak danych w zakresie.");
  const last=pts[pts.length-1];
  // TWR (skumulowany) — łańcuch dziennych zwrotów z neutralizacją przepływów
  let twr=1;
  for(let i=1;i<pts.length;i++){ const den=pts[i-1].port; if(den>0) twr*=(pts[i].port-(pts[i].cf||0))/den; }
  const twrPct=(twr-1)*100;
  // XIRR (rocznie) — przepływy zewnętrzne z computePF + wartość końcowa
  const portFlows=flows.concat([{ date:last.date, amt:last.port }]);
  const xr=xirr(portFlows);
  // benchmark TWR = zwrot QQQ w PLN za okres
  const f0=pts[0].date; const qS=onOrBefore(qqq,f0), qE=onOrBefore(qqq,last.date);
  const fS=onOrBefore(fx,f0)||4.0, fE=onOrBefore(fx,last.date)||4.0;
  const benchTwrPct=(qS&&qE)? ((qE*fE)/(qS*fS)-1)*100 : null;
  // benchmark XIRR = te same przepływy, wartość końcowa = Nasdaq-ekwiwalent
  const benchFlows=flows.concat([{ date:last.date, amt:last.bench }]);
  const bx=xirr(benchFlows);
  return { pts, failed, mode, twrPct, xirrPct: xr!=null? xr*100:null,
           benchTwrPct, benchXirrPct: bx!=null? bx*100:null };
}
function renderPortfolioView(){
  if(!allTx.length){ $("content").innerHTML='<div class="card"><div class="empty">Dodaj transakcje, aby porównać portfel z Nasdaq 100.</div></div>'; return; }
  $("content").innerHTML='<div class="card"><div class="empty">Liczę portfel i pobieram Nasdaq + kurs USD/PLN…</div></div>';
  buildPortfolio().then(res=>{
    const pts=res.pts; const last=pts[pts.length-1];
    const invested=last.invested, port=last.port, bench=last.bench;
    const portPct=invested>0?(port/invested-1)*100:0;
    const benchPct=invested>0?(bench/invested-1)*100:0;
    const edge=port-bench; const alpha=portPct-benchPct; const ahead=edge>=0;
    const twrPct=res.twrPct; const xirrPct=res.xirrPct;
    const bTwr=res.benchTwrPct; const bXirr=res.benchXirrPct;
    const cP=v=>(v>=0?"gain":"loss");
    const showP=v=> v!=null? fmtPct(v):"—";
    let warn = res.failed.length ? '<div class="msg warn">Nie pobrano danych dla: '+res.failed.join(", ")+' — te spółki nie są wliczone.</div>' : '';
    $("content").innerHTML=
      '<div class="card" style="margin-bottom:14px">'+
        '<div class="rhead"><div><div class="meta">TWÓJ PORTFEL vs NASDAQ 100</div>'+
        '<div class="tk" style="font-size:17px">Przewaga: <span class="'+(ahead?"gain":"loss")+'">'+(ahead?"+":"")+fmtPLN(edge)+'</span></div></div>'+
        '<div class="rpct '+(ahead?"gain":"loss")+'">'+(alpha>=0?"+":"")+alpha.toFixed(2)+' pp</div></div>'+
        '<div class="statline"><span class="stk"><span class="dot" style="background:var(--accent)"></span>Twój portfel</span>'+

        '<div class="statline"><span class="stk"><span class="dot" style="background:var(--bench)"></span>Nasdaq 100 (te same wpłaty)</span>'+
          '<span class="sv">'+fmtPLN(bench)+' <span class="'+(benchPct>=0?"gain":"loss")+'" style="font-size:13px">'+fmtPct(benchPct)+'</span></span></div>'+

        (res.mode && Math.abs(last.cash)>0.5 ? '<div class="statline"><span class="stk">w tym gotówka (nieziwestowana)</span><span class="sv" style="font-size:14px">'+fmtPLN(last.cash)+'</span></div>' : '')+
        '<div class="statline"><span class="stk">TWR — jakość wyborów (skumul.)</span><span class="sv" style="font-size:13px"><span class="'+cP(twrPct)+'">Ty '+fmtPct(twrPct)+'</span> · <span class="'+cP(bTwr==null?-1:bTwr)+'">QQQ '+showP(bTwr)+'</span></span></div>'+
        '<div class="statline"><span class="stk">XIRR — rocznie (z timingiem)</span><span class="sv" style="font-size:13px"><span class="'+cP(xirrPct==null?-1:xirrPct)+'">Ty '+showP(xirrPct)+'</span> · <span class="'+cP(bXirr==null?-1:bXirr)+'">QQQ '+showP(bXirr)+'</span></span></div>'+
        warn+
      '</div>'+
      '<div class="card"><div class="meta" style="margin-bottom:8px">WARTOŚĆ W CZASIE (PLN)</div>'+
        '<canvas id="pfChart" height="160"></canvas>'+
        '<div class="legend"><span><span class="dot" style="background:var(--accent)"></span>Twój portfel</span>'+
        '<span><span class="dot" style="background:var(--bench)"></span>Nasdaq 100</span></div></div>';
    drawPFChart(pts);
  }).catch(e=>{
    $("content").innerHTML='<div class="card"><div class="msg err">'+e.message+'</div></div>';
  });
}

function renderChartView(){
  const tickers=uniqueTickers();
  if(!tickers.length){ $("content").innerHTML='<div class="card"><div class="empty">Dodaj najpierw transakcje.</div></div>'; return; }
  if(!selectedTicker || !tickers.find(t=> (t.ticker+"|"+t.country)===selectedTicker)) selectedTicker=tickers[0].ticker+"|"+tickers[0].country;
  $("content").innerHTML='<p class="sub">Zwrot od ceny zakupu do ostatniej sesji. Wybierz spółkę:</p>'+
    '<div class="chips" id="chips"></div><div class="card" id="chartCard"><div class="empty">Wybierz spółkę…</div></div>';
  const chips=$("chips");
  chips.innerHTML=tickers.map(t=>{ const key=t.ticker+"|"+t.country;
    return '<div class="chip'+(key===selectedTicker?" active":"")+'" data-key="'+key+'">'+t.ticker+' · '+t.country+'</div>'; }).join("");
  chips.querySelectorAll(".chip").forEach(el=> el.onclick=()=>{ selectedTicker=el.getAttribute("data-key"); renderChartView(); });
  loadChart(tickers.find(t=> (t.ticker+"|"+t.country)===selectedTicker));
}
async function loadChart(t){
  const card=$("chartCard"); card.innerHTML='<div class="empty">Pobieram kursy '+t.ticker+'…</div>';
  try{
    const series=await fetchSeries(t.ticker,t.country); const end=lastBusinessDay();
    const range=series.filter(p=> p.date>=t.firstDate && p.date<=end);
    if(!range.length) throw new Error("Brak danych od daty zakupu ("+t.firstDate+") do dziś.");
    const usePrice=(t.buyPrice!=null && t.buyPrice>0);
    const base=usePrice?t.buyPrice:range[0].close;
    const baseLabel=usePrice?("cena zakupu "+t.buyPrice):"kurs zamknięcia";
    const pts=range.map(p=> ({ date:p.date, pct:(p.close-base)/base*100, close:p.close }));
    const last=pts[pts.length-1]; const isProfit=last.pct>=0;
    card.innerHTML='<div class="rhead"><div><div class="tk" style="font-size:17px">'+t.ticker+'</div>'+
      '<div class="meta">od '+t.firstDate+' · baza: '+baseLabel+' · '+pts.length+' sesji</div></div>'+
      '<div class="rpct '+(isProfit?"gain":"loss")+'">'+(isProfit?"+":"")+last.pct.toFixed(2)+'%</div></div>'+
      '<canvas id="chart" height="150"></canvas>'+
      '<div class="rfoot">Ostatni kurs zamknięcia: <strong>'+last.close.toFixed(2)+'</strong></div>';
    drawChart(pts,isProfit);
  }catch(e){ card.innerHTML='<div class="msg err">'+e.message+'</div>'; }
}
function drawChart(pts,isProfit){
  if(chart){ chart.destroy(); chart=null; }
  const ctx=$("chart").getContext("2d"); const color=isProfit?"#16A34A":"#DC2626";
  chart=new Chart(ctx,{ type:"line",
    data:{ labels:pts.map(p=>p.date), datasets:[{ data:pts.map(p=>p.pct), borderColor:color, borderWidth:2, pointRadius:0, tension:0.15 }] },
    options:{ responsive:true, maintainAspectRatio:true,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=> "Zwrot: "+c.parsed.y.toFixed(2)+"%" } } },
      scales:{ x:{ ticks:{ maxTicksLimit:6, font:{size:10}, color:"#94A3B8" }, grid:{display:false} },
        y:{ ticks:{ callback:v=> v.toFixed(0)+"%", font:{size:10}, color:"#94A3B8" }, grid:{color:"#EEF1F5"} } } }
  });
}

/* ---------- IMPORT XTB ---------- */
const ANUM={ "53339039":"IKE", "52040210":"XTB_PLN", "50356831":"XTB_USD", "50098773":"XTB_USD" };
const SKIP_TK=new Set(["US100","GOLD","DE40","OIL","EURUSD","GBPUSD","DE30","SPX500"]);
function cT(t){ return (t||"").replace(/\.(US|PL|DE|SW|UK)$/,""); }
function parseXTB(wb){
  const ws=wb.Sheets["Cash Operations"];
  if(!ws) throw new Error("Brak arkusza 'Cash Operations' — czy to wyciąg gotówkowy z XTB?");
  const rows=XLSX.utils.sheet_to_json(ws,{header:1, raw:true});
  let acct=null;
  for(const r of rows){ if(r[0]==="Account number"){ acct=ANUM[String(r[1]).replace(/\.0$/,"")]||null; break; } }
  let h=-1; for(let i=0;i<rows.length;i++){ if(rows[i][0]==="Type"){ h=i; break; } }
  if(h<0) throw new Error("Nie znaleziono nagłówka transakcji w pliku.");
  const isUSD = acct==="XTB_USD";
  const amtKey = isUSD?"amount_usd":"amount_pln";
  const out=[]; let skipped=0;
  for(let i=h+1;i<rows.length;i++){
    const r=rows[i]; const T=r[0]; if(!T||T==="Total") continue;
    const tk=String(r[1]||"").trim(); const time=r[3]; const amt=parseFloat(r[4])||0; const id=r[5]; const cmt=String(r[6]||"");
    let date;
    if(time instanceof Date) date=new Date(time.getTime()-time.getTimezoneOffset()*60000).toISOString().slice(0,10);
    else if(typeof time==="number") date=new Date(Math.round((time-25569)*864e5)).toISOString().slice(0,10);
    else date=String(time).slice(0,10);
    if(SKIP_TK.has(cT(tk))){ skipped++; continue; }
    const country = tk.indexOf(".US")>=0?"US":"PL";
    const note = id? ("xtb:"+id) : null;
    const A=(v)=>{ const o={}; o[amtKey]=v; return o; };
    if(T==="IKE deposit"||T==="Deposit") out.push(Object.assign({type:"deposit",account:acct,date,note},A(Math.abs(amt))));
    else if(T==="Withdrawal") out.push(Object.assign({type:"withdraw",account:acct,date,note},A(Math.abs(amt))));
    else if(T==="Stock purchase"){ const m=cmt.match(/OPEN BUY ([\d.]+)(?:\/[\d.]+)? @ ([\d.]+)/); if(!m){skipped++;continue;} out.push(Object.assign({type:"buy",account:acct,ticker:cT(tk),country,qty:+m[1],price:+m[2],date,note},A(Math.abs(amt)))); }
    else if(T==="Stock sell"){ const m=cmt.match(/CLOSE BUY ([\d.]+)(?:\/[\d.]+)? @ ([\d.]+)/); if(!m){skipped++;continue;} out.push(Object.assign({type:"sell",account:acct,ticker:cT(tk),country,qty:+m[1],price:+m[2],date,note},A(Math.abs(amt)))); }
    else if(T==="Dividend") out.push(Object.assign({type:"dividend",account:acct,ticker:cT(tk),date,note},A(amt)));
    else if(T==="Withholding tax") out.push(Object.assign({type:"tax",account:acct,ticker:cT(tk),date,note},A(amt)));
    else if(T==="Free funds interest") out.push(Object.assign({type:"interest",account:acct,date,note},A(amt)));
    else skipped++;
  }
  return { account:acct, txs:out, skipped };
}
let pendingImport=null;
async function handleImportFile(file){
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(new Uint8Array(buf),{type:"array", cellDates:true});
    const parsed=parseXTB(wb);
    if(!parsed.account) throw new Error("Nie rozpoznano numeru rachunku XTB w pliku.");
    if(!parsed.txs.length) throw new Error("Nie znaleziono operacji do importu.");
    pendingImport=parsed; renderImportReview(parsed);
  }catch(e){ $("content").innerHTML='<div class="card"><div class="msg err">Błąd importu: '+e.message+'</div><button class="secondary" id="impBack">← Wróć</button></div>'; $("impBack").onclick=()=>{ activeTab="tx"; renderTab(); }; }
}
function renderImportReview(p){
  const TLABEL={deposit:"Wpłaty",withdraw:"Wypłaty",buy:"Zakupy",sell:"Sprzedaże",dividend:"Dywidendy",tax:"Podatek u źródła",interest:"Odsetki"};
  const byType={}; p.txs.forEach(t=> byType[t.type]=(byType[t.type]||0)+1);
  const rowsHtml=Object.keys(TLABEL).filter(k=>byType[k]).map(k=>
    '<div class="statline"><span class="stk">'+TLABEL[k]+'</span><span class="sv" style="font-size:14px">'+byType[k]+'</span></div>').join("");
  const accLabel=ACC_LABEL[p.account]||p.account;
  $("content").innerHTML=
    '<div class="card" style="margin-bottom:14px"><div class="rhead"><div><div class="meta">PRZEGLĄD IMPORTU</div>'+
      '<div class="tk" style="font-size:17px">Rachunek: '+accLabel+'</div></div>'+
      '<div class="rpct" style="font-size:22px">'+p.txs.length+'</div></div>'+
      rowsHtml+
      (p.skipped?'<div class="statline"><span class="stk">Pominięte (CFD/inne)</span><span class="sv" style="font-size:14px;color:var(--muted)">'+p.skipped+'</span></div>':'')+
      '<div class="msg" style="background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE">Wpłaty z tego rachunku napędzą benchmark Nasdaq. Zakupy/sprzedaże/dywidendy to ruchy wewnętrzne. Powtórny import pomija duplikaty.</div>'+
    '</div>'+
    '<div style="display:flex;gap:8px"><button class="secondary" id="impCancel" style="margin-top:0">Anuluj</button>'+
    '<button class="primary" id="impGo">Importuj do chmury ('+p.txs.length+')</button></div>'+
    '<div id="impMsg"></div>';
  $("impCancel").onclick=()=>{ pendingImport=null; activeTab="tx"; renderTab(); };
  $("impGo").onclick=doImport;
}
async function doImport(){
  if(!pendingImport) return;
  const btn=$("impGo"); btn.disabled=true; btn.textContent="Importuję…";
  try{
    const { data }=await sb.from("transactions").select("note");
    const existing=new Set((data||[]).map(r=>r.note).filter(Boolean));
    const fresh=pendingImport.txs.filter(t=> !t.note || !existing.has(t.note));
    for(let i=0;i<fresh.length;i+=200){ const { error }=await sb.from("transactions").insert(fresh.slice(i,i+200)); if(error) throw error; }
    const dup=pendingImport.txs.length-fresh.length;
    $("impMsg").innerHTML='<div class="msg ok">Zaimportowano '+fresh.length+' pozycji'+(dup?(' ('+dup+' duplikatów pominięto)'):'')+'. Sprawdź zakładkę Portfel.</div>';
    pendingImport=null; await fetchTx();
    setTimeout(()=>{ activeTab="pf"; renderTab(); }, 1500);
  }catch(e){ btn.disabled=false; btn.textContent="Importuj do chmury"; $("impMsg").innerHTML='<div class="msg err">Błąd: '+e.message+'</div>'; }
}

/* ---------- TRANSAKCJE ---------- */
const ACCOUNTS=[["IKE","IKE (PLN)"],["XTB_PLN","XTB PLN"],["XTB_USD","XTB USD"],["IBKR","IBKR"]];
const ACC_LABEL={IKE:"IKE",XTB_PLN:"XTB PLN",XTB_USD:"XTB USD",IBKR:"IBKR"};
const ACC_CUR={IKE:"PLN",XTB_PLN:"PLN",XTB_USD:"USD",IBKR:"USD"};
function renderTxView(){
  $("content").innerHTML='<p class="sub">Dodaj transakcję lub wpłatę — zapisze się w chmurze i pojawi na każdym urządzeniu.</p>'+
    '<div class="card">'+
      '<div class="grid2">'+
        '<div><label class="f">Typ</label><select id="t_type"><option value="buy">Kup</option><option value="sell">Sprzedaj</option><option value="deposit">Wpłata</option><option value="withdraw">Wypłata</option></select></div>'+
        '<div><label class="f">Konto</label><select id="t_account">'+ACCOUNTS.map(a=>'<option value="'+a[0]+'">'+a[1]+'</option>').join("")+'</select></div>'+
      '</div>'+
      '<div id="t_fields"></div>'+
      '<button class="primary" id="addBtn" style="margin-top:12px">Dodaj</button>'+
      '<div id="addMsg"></div>'+
    '</div>'+
    '<div class="card" style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><label class="f" style="margin:0">Twoje transakcje (z chmury)</label>'+
      '<button class="secondary" id="impBtn" style="margin:0;width:auto;padding:7px 12px;font-size:13px">📥 Importuj z XTB</button></div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;min-height:34px"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer"><input type="checkbox" id="selAll" style="width:18px;height:18px"/> Zaznacz wszystkie</label><div id="bulkBar"></div></div>'+
      '<input type="file" id="impFile" accept=".xlsx,.xls" style="display:none"/><div id="txList"></div></div>';
  $("t_type").onchange=renderTxFields;
  $("t_account").onchange=()=>{ const cur=$("t_currency"); if(cur) cur.value=ACC_CUR[$("t_account").value]||"PLN"; };
  $("impBtn").onclick=()=> $("impFile").click();
  $("impFile").onchange=(e)=>{ const f=e.target.files[0]; if(f){ $("content").innerHTML='<div class="card"><div class="empty">Czytam plik XTB…</div></div>'; handleImportFile(f); } };
  $("selAll").onclick=()=>{ if($("selAll").checked){ allTx.forEach(t=>selTx.add(String(t.id))); } else { selTx.clear(); } drawTxList(); };
  renderTxFields(); $("addBtn").onclick=addTx; drawTxList();
}
function renderTxFields(){
  const type=$("t_type").value; const box=$("t_fields");
  if(type==="deposit"||type==="withdraw"){
    box.innerHTML='<div class="grid2"><div><label class="f">Kwota</label><input id="t_amount" type="number" inputmode="decimal" placeholder="np. 5000"/></div>'+
      '<div><label class="f">Waluta</label><select id="t_currency"><option>PLN</option><option>USD</option></select></div></div>'+
      '<div class="grid2"><div><label class="f">Data</label><input id="t_date" type="date"/></div><div></div></div>';
    const cur=$("t_currency"); if(cur) cur.value=ACC_CUR[$("t_account").value]||"PLN";
  } else {
    box.innerHTML='<div class="grid2"><div><label class="f">Ticker</label><input id="t_ticker" placeholder="np. CRWD" autocapitalize="characters"/></div>'+
      '<div><label class="f">Kraj</label><select id="t_country"><option>US</option><option>PL</option></select></div></div>'+
      '<div class="grid2"><div><label class="f">Data</label><input id="t_date" type="date"/></div>'+
      '<div><label class="f">Ilość</label><input id="t_qty" type="number" inputmode="decimal" placeholder="np. 1"/></div></div>'+
      '<div class="grid2"><div><label class="f">Cena (opcjonalnie)</label><input id="t_price" type="number" inputmode="decimal" placeholder="np. 250"/></div><div></div></div>';
  }
}
let selTx=new Set();
function drawTxList(){
  const box=$("txList");
  if(!allTx.length){ box.innerHTML='<div class="empty">Brak transakcji. Dodaj pierwszą powyżej.</div>'; selTx.clear(); updateBulkBar(); return; }
  const TC={buy:["KUP","#16A34A"],sell:["SPRZ","#DC2626"],deposit:["WPŁATA","#2563EB"],withdraw:["WYPŁATA","#F59E0B"],dividend:["DYWID.","#0891B2"],tax:["PODATEK","#9333EA"],interest:["ODSETKI","#0D9488"]};
  box.innerHTML=allTx.map(tx=>{ const m=TC[tx.type]||["INNE","#64748B"]; const c=m[1], t=m[0];
    const acc=tx.account?(" · "+(ACC_LABEL[tx.account]||tx.account)):"";
    const amtStr=tx.amount_pln!=null?((+tx.amount_pln).toFixed(2)+" PLN"):(tx.amount_usd!=null?((+tx.amount_usd).toFixed(2)+" USD"):null);
    let title, det;
    if(tx.type==="buy"||tx.type==="sell"){
      title='<span class="tk">'+(tx.ticker||"—")+'</span> <span class="meta" style="display:inline">· '+(tx.country||"")+'</span>';
      const d=[ tx.qty!=null?tx.qty+" szt":null, tx.price!=null?"@ "+tx.price:null ].filter(Boolean).join(" · ");
      det=tx.date+(d?" · "+d:"")+acc;
    } else {
      title='<span class="tk">'+(amtStr||"—")+'</span>'+(tx.ticker?' <span class="meta" style="display:inline">· '+tx.ticker+'</span>':'');
      det=tx.date+acc;
    }
    const ck=selTx.has(String(tx.id))?"checked":"";
    return '<div class="row"><label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;min-width:0"><input type="checkbox" class="selbox" data-id="'+tx.id+'" '+ck+' style="width:18px;height:18px;flex:none"/>'+
      '<div style="flex:1;min-width:0"><div><span class="badge" style="background:'+c+'22;color:'+c+'">'+t+'</span>'+title+'</div>'+
      '<div class="meta">'+det+'</div></div></label><span class="x" data-id="'+tx.id+'">✕</span></div>'; }).join("");
  box.querySelectorAll(".x").forEach(el=> el.onclick=(e)=>{ e.preventDefault(); delTx(el.getAttribute("data-id")); });
  box.querySelectorAll(".selbox").forEach(el=> el.onchange=()=>{ const id=el.getAttribute("data-id"); if(el.checked) selTx.add(id); else selTx.delete(id); updateBulkBar(); });
  updateBulkBar();
}
function updateBulkBar(){
  const bar=$("bulkBar"); if(bar){ const n=selTx.size;
    bar.innerHTML = n? '<button class="primary" id="delSelBtn" style="background:var(--loss);margin:0;width:auto;padding:7px 12px;font-size:13px">Usuń zaznaczone ('+n+')</button>' : '';
    if(n) $("delSelBtn").onclick=delSelected; }
  const sa=$("selAll"); if(sa) sa.checked = selTx.size>0 && selTx.size===allTx.length;
}
async function delSelected(){
  const ids=[...selTx]; if(!ids.length) return;
  if(!confirm("Usunąć "+ids.length+" zaznaczonych operacji? Tej operacji nie można cofnąć.")) return;
  const btn=$("delSelBtn"); if(btn){ btn.disabled=true; btn.textContent="Usuwam…"; }
  const { error }=await sb.from("transactions").delete().in("id",ids);
  if(error){ alert("Błąd usuwania: "+error.message); if(btn){ btn.disabled=false; btn.textContent="Usuń zaznaczone"; } return; }
  selTx.clear(); await fetchTx(); drawTxList();
}
async function addTx(){
  const msg=$("addMsg");
  const type=$("t_type").value, account=$("t_account").value, date=$("t_date").value;
  if(!date){ msg.innerHTML='<div class="msg err">Podaj datę.</div>'; return; }
  let rec;
  if(type==="deposit"||type==="withdraw"){
    const amount=$("t_amount").value?parseFloat($("t_amount").value):null; const cur=$("t_currency").value;
    if(!amount||amount<=0){ msg.innerHTML='<div class="msg err">Podaj kwotę.</div>'; return; }
    rec={ date, account, type, amount_pln: cur==="PLN"?amount:null, amount_usd: cur==="USD"?amount:null };
  } else {
    const ticker=$("t_ticker").value.trim().toUpperCase(), country=$("t_country").value;
    const qty=$("t_qty").value?parseFloat($("t_qty").value):null, price=$("t_price").value?parseFloat($("t_price").value):null;
    if(!ticker){ msg.innerHTML='<div class="msg err">Podaj ticker.</div>'; return; }
    rec={ date, account, type, ticker, country, qty, price };
  }
  const btn=$("addBtn"); btn.disabled=true; btn.textContent="Zapisuję…";
  const {error}=await sb.from("transactions").insert(rec);
  btn.disabled=false; btn.textContent="Dodaj";
  if(error){ msg.innerHTML='<div class="msg err">Błąd zapisu: '+error.message+'</div>'; return; }
  msg.innerHTML='<div class="msg ok">Zapisano w chmurze.</div>';
  setTimeout(()=>{ msg.innerHTML=""; },2000);
  renderTxFields(); await fetchTx(); drawTxList();
}
async function delTx(id){ await sb.from("transactions").delete().eq("id",id); await fetchTx(); drawTxList(); }

init();
</script>
