<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Portfel</title>

<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="icon" href="/icon-192.png" />
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Portfel" />
<meta name="theme-color" content="#0F1B2D" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>

<style>
  :root{
    --ink:#0F1B2D; --bg:#F5F6F8; --surface:#FFFFFF; --muted:#64748B;
    --line:#E6E9EF; --accent:#2563EB; --gain:#16A34A; --loss:#DC2626;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--ink);
    padding:max(16px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .brand img{width:32px;height:32px;border-radius:9px;}
  h1{font-size:18px;font-weight:800;margin:0;}
  .sub{color:var(--muted);font-size:13px;margin:4px 0 18px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;
        box-shadow:0 1px 2px rgba(15,27,45,.04),0 8px 24px rgba(15,27,45,.04);}
  label.f{font-size:12px;color:var(--muted);display:block;margin:0 0 5px 2px;font-weight:600;}
  input,select{width:100%;padding:11px 12px;font-size:15px;border:1px solid #CBD5E1;border-radius:10px;
        background:#fff;outline:none;color:var(--ink);-webkit-appearance:none;appearance:none;}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  input.code{font-size:24px;letter-spacing:8px;text-align:center;font-weight:700;font-family:monospace;}
  button.primary{width:100%;padding:13px 20px;background:var(--accent);color:#fff;border:0;border-radius:11px;
        font-size:15px;font-weight:700;cursor:pointer;}
  button.primary:disabled{opacity:.6;cursor:default;}
  button.link{background:none;border:0;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;padding:8px 0;}
  .grid{display:grid;grid-template-columns:1fr 80px 90px;gap:8px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}.grid2{grid-template-columns:1fr;}}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:0;}
  .tk{font-size:15px;font-weight:700;}
  .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .x{color:var(--muted);cursor:pointer;font-size:14px;padding:4px 8px;}
  .x:hover{color:var(--loss);}
  .msg{font-size:13px;margin-top:10px;padding:10px 12px;border-radius:10px;}
  .msg.ok{color:var(--gain);background:#F0FDF4;border:1px solid #BBF7D0;}
  .msg.err{color:var(--loss);background:#FEF2F2;border:1px solid #FECACA;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .who{font-size:12px;color:var(--muted);}
  .logout{font-size:12px;color:var(--accent);background:none;border:0;cursor:pointer;font-weight:600;}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;display:inline-block;margin-right:6px;}
  .empty{text-align:center;color:#94A3B8;font-size:14px;padding:30px 10px;}
  .center{min-height:70vh;display:flex;flex-direction:column;justify-content:center;}
  .pill{display:inline-block;background:#EFF6FF;color:var(--accent);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="empty">Ładowanie…</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let sb = null;
let session = null;
let pendingEmail = null;

function configOk(){
  return window.SUPABASE_URL && window.SUPABASE_ANON_KEY
    && window.SUPABASE_URL.indexOf("WKLEJ") < 0
    && window.SUPABASE_ANON_KEY.indexOf("WKLEJ") < 0;
}

function init(){
  if(!configOk()){
    $("root").innerHTML =
      '<div class="brand"><img src="/icon-192.png" alt=""/><h1>Portfel</h1></div>'+
      '<div class="card" style="margin-top:14px"><div class="msg err">Brak konfiguracji Supabase. '+
      'Uzupełnij plik <strong>config.js</strong> (adres projektu i klucz publiczny), zgodnie z instrukcją.</div></div>';
    return;
  }
  sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{
    session = data.session;
    sb.auth.onAuthStateChange((_e, s)=>{ session = s; route(); });
    route();
  });
}

function route(){
  if(session && session.user) renderApp();
  else renderLoginEmail();
}

/* ---------- LOGOWANIE KROK 1: e-mail ---------- */
function renderLoginEmail(){
  $("root").innerHTML =
    '<div class="center">'+
      '<div class="brand"><img src="/icon-192.png" alt=""/><h1>Portfel</h1></div>'+
      '<p class="sub">Zaloguj się, by Twoje dane były te same na telefonie i komputerze.</p>'+
      '<div class="card">'+
        '<span class="pill">Logowanie kodem z e-maila</span>'+
        '<label class="f">Twój e-mail</label>'+
        '<input id="email" type="email" inputmode="email" autocomplete="email" placeholder="ty@example.com"/>'+
        '<button class="primary" id="sendBtn" style="margin-top:12px">Wyślij kod</button>'+
        '<div id="loginMsg"></div>'+
      '</div>'+
    '</div>';
  if(pendingEmail) $("email").value = pendingEmail;
  $("sendBtn").onclick = sendCode;
  $("email").addEventListener("keydown", e=>{ if(e.key==="Enter") sendCode(); });
}

async function sendCode(){
  const email = $("email").value.trim();
  const msg = $("loginMsg");
  if(!email){ msg.innerHTML = '<div class="msg err">Podaj e-mail.</div>'; return; }
  const btn = $("sendBtn"); btn.disabled = true; btn.textContent = "Wysyłam…";
  const { error } = await sb.auth.signInWithOtp({ email });
  btn.disabled = false; btn.textContent = "Wyślij kod";
  if(error){
    let m = error.message;
    if(/rate limit/i.test(m)) m = "Za dużo prób w krótkim czasie. Odczekaj ~godzinę i spróbuj ponownie. (Na komputerze, gdzie już się zalogowałeś, działasz normalnie.)";
    msg.innerHTML = '<div class="msg err">'+m+'</div>';
    return;
  }
  pendingEmail = email;
  renderLoginCode();
}

/* ---------- LOGOWANIE KROK 2: kod ---------- */
function renderLoginCode(){
  $("root").innerHTML =
    '<div class="center">'+
      '<div class="brand"><img src="/icon-192.png" alt=""/><h1>Portfel</h1></div>'+
      '<p class="sub">Wysłaliśmy 6-cyfrowy kod na <strong>'+pendingEmail+'</strong>. Otwórz e-mail, przepisz kod tutaj i zaloguj się — bez wychodzenia z aplikacji.</p>'+
      '<div class="card">'+
        '<label class="f">Kod z e-maila</label>'+
        '<input id="code" class="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="••••••"/>'+
        '<button class="primary" id="verifyBtn" style="margin-top:12px">Zaloguj</button>'+
        '<div id="codeMsg"></div>'+
        '<div style="text-align:center;margin-top:6px">'+
          '<button class="link" id="backBtn">← zmień e-mail</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  $("verifyBtn").onclick = verifyCode;
  $("backBtn").onclick = renderLoginEmail;
  $("code").addEventListener("keydown", e=>{ if(e.key==="Enter") verifyCode(); });
  $("code").focus();
}

async function verifyCode(){
  const token = $("code").value.trim();
  const msg = $("codeMsg");
  if(token.length < 6){ msg.innerHTML = '<div class="msg err">Wpisz pełny 6-cyfrowy kod.</div>'; return; }
  const btn = $("verifyBtn"); btn.disabled = true; btn.textContent = "Sprawdzam…";
  const { error } = await sb.auth.verifyOtp({ email: pendingEmail, token, type: "email" });
  btn.disabled = false; btn.textContent = "Zaloguj";
  if(error){
    msg.innerHTML = '<div class="msg err">Kod niepoprawny lub wygasł. Sprawdź, czy przepisałeś dobrze, albo wyślij nowy.</div>';
    return;
  }
  // sukces -> onAuthStateChange przeniesie do aplikacji
}

/* ---------- APLIKACJA (po zalogowaniu) ---------- */
async function renderApp(){
  $("root").innerHTML =
    '<div class="topbar">'+
      '<div class="brand"><img src="/icon-192.png" alt=""/><h1>Portfel</h1></div>'+
      '<div style="text-align:right"><div class="who">'+session.user.email+'</div>'+
      '<button class="logout" id="logoutBtn">Wyloguj</button></div>'+
    '</div>'+
    '<p class="sub">Etap 1: dane w chmurze. Dodaj transakcję na jednym urządzeniu i sprawdź, że pojawia się na drugim.</p>'+
    '<div class="card">'+
      '<div class="grid">'+
        '<div><label class="f">Ticker</label><input id="t_ticker" placeholder="np. CRWD" autocapitalize="characters"/></div>'+
        '<div><label class="f">Kraj</label><select id="t_country"><option>US</option><option>PL</option></select></div>'+
        '<div><label class="f">Typ</label><select id="t_type"><option value="buy">Kup</option><option value="sell">Sprzedaj</option></select></div>'+
      '</div>'+
      '<div class="grid2">'+
        '<div><label class="f">Data</label><input id="t_date" type="date"/></div>'+
        '<div><label class="f">Ilość</label><input id="t_qty" type="number" inputmode="decimal" placeholder="np. 1"/></div>'+
      '</div>'+
      '<div class="grid2">'+
        '<div><label class="f">Cena (opcjonalnie)</label><input id="t_price" type="number" inputmode="decimal" placeholder="np. 250"/></div>'+
        '<div style="display:flex;align-items:flex-end"><button class="primary" id="addBtn">Dodaj transakcję</button></div>'+
      '</div>'+
      '<div id="addMsg"></div>'+
    '</div>'+
    '<div class="card" style="margin-top:14px">'+
      '<label class="f" style="margin-bottom:10px">Twoje transakcje (z chmury)</label>'+
      '<div id="txList"><div class="empty">Wczytuję…</div></div>'+
    '</div>';
  $("logoutBtn").onclick = ()=> sb.auth.signOut();
  $("addBtn").onclick = addTx;
  loadTx();
}

async function addTx(){
  const msg = $("addMsg");
  const ticker = $("t_ticker").value.trim().toUpperCase();
  const country = $("t_country").value;
  const type = $("t_type").value;
  const date = $("t_date").value;
  const qty = $("t_qty").value ? parseFloat($("t_qty").value) : null;
  const price = $("t_price").value ? parseFloat($("t_price").value) : null;
  if(!ticker){ msg.innerHTML = '<div class="msg err">Podaj ticker.</div>'; return; }
  if(!date){ msg.innerHTML = '<div class="msg err">Podaj datę.</div>'; return; }
  const btn = $("addBtn"); btn.disabled = true; btn.textContent = "Zapisuję…";
  const { error } = await sb.from("transactions").insert({ date, country, type, ticker, qty, price });
  btn.disabled = false; btn.textContent = "Dodaj transakcję";
  if(error){ msg.innerHTML = '<div class="msg err">Błąd zapisu: '+error.message+'</div>'; return; }
  msg.innerHTML = '<div class="msg ok">Zapisano w chmurze.</div>';
  $("t_ticker").value = ""; $("t_qty").value = ""; $("t_price").value = "";
  setTimeout(()=>{ msg.innerHTML=""; }, 2500);
  loadTx();
}

async function loadTx(){
  const box = $("txList");
  const { data, error } = await sb.from("transactions")
    .select("*").order("date",{ascending:false}).order("created_at",{ascending:false});
  if(error){ box.innerHTML = '<div class="msg err">Błąd odczytu: '+error.message+'</div>'; return; }
  if(!data || !data.length){ box.innerHTML = '<div class="empty">Brak transakcji. Dodaj pierwszą powyżej.</div>'; return; }
  box.innerHTML = data.map(tx=>{
    const isBuy = tx.type === "buy";
    const badgeC = isBuy ? "#16A34A" : "#DC2626";
    const badgeT = isBuy ? "KUP" : "SPR";
    const det = [ tx.qty!=null ? tx.qty+" szt" : null, tx.price!=null ? "@ "+tx.price : null ].filter(Boolean).join(" · ");
    return '<div class="row">'+
      '<div><div><span class="badge" style="background:'+badgeC+'22;color:'+badgeC+'">'+badgeT+'</span>'+
      '<span class="tk">'+tx.ticker+'</span> <span class="meta" style="display:inline">· '+tx.country+'</span></div>'+
      '<div class="meta">'+tx.date+(det?" · "+det:"")+'</div></div>'+
      '<span class="x" data-id="'+tx.id+'">✕</span>'+
    '</div>';
  }).join("");
  box.querySelectorAll(".x").forEach(el=>{ el.onclick = ()=> delTx(el.getAttribute("data-id")); });
}

async function delTx(id){
  const { error } = await sb.from("transactions").delete().eq("id", id);
  if(!error) loadTx();
}

init();
</script>
</body>
</html>
